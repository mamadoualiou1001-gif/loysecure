{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 text-center">
            <div class="card-body p-5">
                <i class="fas fa-envelope fa-4x text-primary mb-3"></i>
                <h3 class="fw-bold">{% trans "Email envoyé !" %}</h3>
                <p class="text-muted mt-3">
                    {% trans "Nous vous avons envoyé un lien pour réinitialiser votre mot de passe." %}
                </p>
                <p class="text-muted">
                    {% trans "Consultez votre boîte de réception (et vos spams)." %}
                </p>
                <a href="{% url 'accounts:login' %}" class="btn btn-primary mt-3">
                    <i class="fas fa-sign-in-alt me-2"></i>{% trans "Retour à la connexion" %}
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
