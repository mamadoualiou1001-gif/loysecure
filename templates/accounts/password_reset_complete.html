{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 text-center">
            <div class="card-body p-5">
                <i class="fas fa-check-circle fa-4x text-success mb-3"></i>
                <h3 class="fw-bold">{% trans "Mot de passe modifié !" %}</h3>
                <p class="text-muted mt-3">
                    {% trans "Votre mot de passe a été modifié avec succès." %}
                </p>
                <a href="{% url 'accounts:login' %}" class="btn btn-primary mt-3">
                    <i class="fas fa-sign-in-alt me-2"></i>{% trans "Se connecter" %}
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
