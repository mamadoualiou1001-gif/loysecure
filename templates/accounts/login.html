{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% load i18n %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white text-center py-3">
                <h3 class="mb-0"><i class="fas fa-sign-in-alt me-2"></i>{% trans "Connexion" %}</h3>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="fas fa-sign-in-alt me-2"></i>{% trans "Se connecter" %}
                    </button>
                </form>
                
                <hr>
                
                <div class="text-center">
                    <p class="mb-2">
                        <a href="{% url 'accounts:password_reset' %}">
                            <i class="fas fa-key me-1"></i>{% trans "Mot de passe oublié ?" %}
                        </a>
                    </p>
                    <p class="mb-0">
                        {% trans "Pas encore de compte ?" %}
                        <a href="{% url 'accounts:register' %}">{% trans "Inscrivez-vous" %}</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
